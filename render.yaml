# Render Blueprint — Saratoga Handicapper
# Deploys both backend (Web Service) and frontend (Static Site) in one click.
# Docs: https://render.com/docs/blueprint-spec

services:

  # ── Backend: Node.js API ───────────────────────────────────────────────────
  - type: web
    name: saratoga-handicapper-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --production
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Optional: add your OpenWeatherMap key for live weather
      # - key: WEATHER_API_KEY
      #   value: your_key_here

  # ── Frontend: React Static Site ───────────────────────────────────────────
  - type: static
    name: saratoga-handicapper-ui
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: saratoga-handicapper-api
          property: host
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
